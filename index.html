<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator Biru Awan</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      /* Background biru awan */
      background: linear-gradient(to bottom, #87CEEB, #B0E0FF);
    }

    .calculator{
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
      padding:20px;
      border-radius:20px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
      width:320px;
      border:2px solid rgba(255,255,255,0.4);
    }

    .title{
      text-align:center;
      margin-bottom:15px;
      color:white;
      font-size:24px;
      font-weight:bold;
      text-shadow:1px 1px 3px rgba(0,0,0,0.3);
    }

    .display{
      width:100%;
      height:60px;
      margin-bottom:15px;
      border:none;
      border-radius:12px;
      padding:10px;
      font-size:28px;
      text-align:right;
      background:white;
      color:#333;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    button{
      height:60px;
      border:none;
      border-radius:12px;
      font-size:22px;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
    }

    .number{
      background:#E3F2FD;
      color:#1565C0;
    }

    .operator{
      background:#64B5F6;
      color:white;
    }

    .equal{
      background:#2196F3;
      color:white;
    }

    .clear{
      background:#42A5F5;
      color:white;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="title">☁ Kalkulator Biru Awan ☁</div>

    <input type="text" class="display" id="display" value="0" readonly>

    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="operator" onclick="appendValue('/')">÷</button>
      <button class="operator" onclick="appendValue('*')">×</button>
      <button class="operator" onclick="appendValue('-')">-</button>

      <button class="number" onclick="appendValue('7')">7</button>
      <button class="number" onclick="appendValue('8')">8</button>
      <button class="number" onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button class="number" onclick="appendValue('4')">4</button>
      <button class="number" onclick="appendValue('5')">5</button>
      <button class="number" onclick="appendValue('6')">6</button>
      <button class="equal" onclick="calculate()">=</button>

      <button class="number" onclick="appendValue('1')">1</button>
      <button class="number" onclick="appendValue('2')">2</button>
      <button class="number" onclick="appendValue('3')">3</button>
      <button class="number" onclick="appendValue('.')">.</button>

      <button class="number" style="grid-column: span 4;" onclick="appendValue('0')">0</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    function appendValue(value) {
      if (display.value === "0") {
        display.value = value;
      } else {
        display.value += value;
      }
    }

    function clearDisplay() {
      display.value = "0";
    }

    function calculate() {
      try {
        let result = eval(display.value);

        // Membuat hasil desimal akurat
        result = parseFloat(result.toFixed(10));

        display.value = result;
      } catch {
        display.value = "Error";
      }
    }
  </script>

</body>
</html>
